<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grade Submissions – Yeshua Educational Platform</title>
    <meta name="description" content="Grade all student submissions in one place" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;0,14..32,900;1,14..32,400&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <style>
        .grade-all-nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: linear-gradient(135deg, #7B1D3C 0%, #3D0920 100%);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 10px rgba(123, 29, 60, 0.2);
        }
        .grade-all-nav-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .back-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }
        .back-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .page-title {
            font-size: 1.25rem;
            font-weight: 800;
            color: white;
            margin: 0;
        }
        .grade-all-nav-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        .nav-dashboard-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            backdrop-filter: blur(10px);
        }
        .nav-dashboard-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: translateY(-2px);
        }
        .teacher-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.2s;
        }
        .teacher-avatar:hover {
            background: rgba(255,255,255,0.3);
            transform: scale(1.1);
        }
    </style>
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="grade-all-nav">
        <div class="grade-all-nav-left">
            <a href="teacher.html#teacher-home" class="back-btn">
                <span style="font-size: 1.25rem;">←</span>
                <span>Back to Dashboard</span>
            </a>
            <h1 class="page-title">✏️ Grade All Submissions</h1>
        </div>
        <div class="grade-all-nav-right">
            <a href="teacher.html#teacher-home" class="nav-dashboard-btn">
                <span>🏠</span>
                <span>Dashboard</span>
            </a>
            <div class="teacher-avatar" id="teacher-avatar" title="Click to go to dashboard" onclick="window.location.href='teacher.html#teacher-home'"></div>
        </div>
    </nav>

    <div id="app"></div>
    <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

    <script src="js/config.js"></script>
    <script src="js/init.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script src="js/sync.js"></script>
    <script src="js/router.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/grade-all.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof DataInit !== 'undefined') {
                DataInit.init();
            }
            
            // Set teacher avatar
            const user = Auth.current();
            const avatar = document.getElementById('teacher-avatar');
            if (avatar && user) {
                avatar.textContent = user.name.charAt(0).toUpperCase();
                avatar.title = `Logged in as ${user.name}`;
            }
        });
    </script>
</body>

</html>
